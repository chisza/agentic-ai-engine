# Cloud Run service definition for the Agentic AI Engine (main application).
#
# Usage (standalone):
#   export PROJECT_ID=cas-ai-agents REGION=europe-north1 IMAGE_TAG=latest \
#          SA=agentic-ai-sa STORAGE_BUCKET=cas-ai-agents-858244425960 \
#          DEFAULT_LLM_MODEL=gemini-2.5-flash AGENT_ENGINE_ID="" \
#          MEMORY_BANK_LOCATION=us-central1 \
#          MCP_FETCH_URL=https://mcp-fetch-<hash>-<region>.a.run.app/sse \
#          CRITIC_A2A_URL=https://critic-a2a-<hash>-<region>.a.run.app/.well-known/agent-card.json
#   envsubst < service.yaml | gcloud run services replace --region=$REGION -
#
# The cloudbuild.yaml pipeline fills in all variables automatically.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentic-ai-engine
  labels:
    cloud.googleapis.com/location: ${REGION}
  annotations:
    # Public URL: accessible from any browser without authentication.
    # The allUsers IAM binding (roles/run.invoker) is set by cloudbuild.yaml.
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Keep ≥1 instance warm — cold starts break WebSocket handshakes.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # CPU must not be throttled between requests: WebSocket connections
        # stay open and need CPU ready to process incoming messages at any time.
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      # Dedicated service account — never runs as the Compute Engine default SA.
      serviceAccountName: ${SA}@${PROJECT_ID}.iam.gserviceaccount.com
      # Allow long-lived WebSocket sessions (max 3600 s on Cloud Run).
      timeoutSeconds: 3600
      # How many concurrent requests one instance handles before Cloud Run
      # spins up another instance.
      containerConcurrency: 80
      containers:
        - image: europe-north1-docker.pkg.dev/${PROJECT_ID}/agentic-ai/${IMAGE_TAG}
          ports:
            - name: http1
              containerPort: 8000
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "${PROJECT_ID}"
            - name: GOOGLE_CLOUD_LOCATION
              value: "${REGION}"
            - name: GOOGLE_CLOUD_STORAGE_BUCKET
              value: "${STORAGE_BUCKET}"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "TRUE"
            # On Cloud Run, SESSION_BACKEND=VERTEX persists sessions in Vertex AI
            # so they survive instance restarts and scale-out events.
            - name: SESSION_BACKEND
              value: "VERTEX"
            - name: DEFAULT_LLM_MODEL
              value: "${DEFAULT_LLM_MODEL}"
            - name: AGENT_ENGINE_ID
              value: "${AGENT_ENGINE_ID}"
            - name: MEMORY_BANK_LOCATION
              value: "${MEMORY_BANK_LOCATION}"
            # URLs of the two Cloud Run side-services, resolved at deploy time.
            - name: MCP_FETCH_URL
              value: "${MCP_FETCH_URL}"
            - name: CRITIC_A2A_URL
              value: "${CRITIC_A2A_URL}"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            # Allow up to 60 s for Vertex AI clients to initialise on cold start.
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
